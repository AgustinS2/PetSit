<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title>Listado de Mascotas</title>
</head>
<body>
<div align="center">
  <h1>Listado de Mascotas</h1>
  <br />
  <table>
    <tr>
      <th><a href="/petsit">Volver al menú principal</a></th>
      <th>&nbsp;</th>
      <th><a href="/petsit/mascotas/new">Crear una nueva Mascota</a></th>
    </tr>
  </table>
  <br />
  <table border="1" cellpadding="10">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Raza</th>
      <th>Color</th>
      <th>Tamaño</th>
      <th>Edad</th>
      <th>Descripción</th>
      <th>Dueño</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="mascota : ${listMascotas}">
      <td th:text="${mascota.id}">ID</td>
      <td th:text="${mascota.nombre}">Nombre</td>
      <td th:text="${mascota.raza}">Raza</td>
      <td th:text="${mascota.color}">Color</td>
      <td th:text="${mascota.tamano}">Tamaño</td>
      <td th:text="${mascota.edad}">Edad</td>
      <td th:text="${mascota.descripcion}">Descripción</td>
      <td th:text="${mascota.dueno.nombre + ' ' + mascota.dueno.apellido}">Dueño</td>
      <td>
        <a th:href="@{'/petsit/mascotas/edit/' + ${mascota.id}}">Editar</a>
        &nbsp;|&nbsp;
        <a th:href="@{'/petsit/mascotas/delete/' + ${mascota.id}}">Borrar</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
