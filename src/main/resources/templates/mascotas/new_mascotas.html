<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title>Crear una nueva Mascota</title>
</head>
<body>
<div align="center">
  <h1>Crear una nueva Mascota</h1>
  <br />
  <table>
    <tr>
      <th><a href="/petsit">Volver al menú principal</a></th>
      <th>&nbsp;</th>
      <th><a href="/petsit/mascotas/list">Volver</a></th>
    </tr>
  </table>
  <br />
  <form th:action="@{/petsit/mascotas/save}" th:object="${mascota}" method="post">
    <table border="0" cellpadding="10">
      <tr><td>Nombre:</td><td><input type="text" th:field="*{nombre}" /></td></tr>
      <tr><td>Raza:</td><td><input type="text" th:field="*{raza}" /></td></tr>
      <tr><td>Color:</td><td><input type="text" th:field="*{color}" /></td></tr>
      <tr>
        <td>Tamaño:</td>
        <td>
          <select th:field="*{tamano}">
            <option value="">Seleccionar tamaño</option>
            <option value="chico">Chico</option>
            <option value="mediano">Mediano</option>
            <option value="grande">Grande</option>
          </select>
        </td>
      </tr>
      <tr><td>Edad:</td><td><input type="number" th:field="*{edad}" /></td></tr>
      <tr><td>Descripción:</td><td><input type="text" th:field="*{descripcion}" /></td></tr>
      <tr><td>Foto (URL):</td><td><input type="text" th:field="*{foto}" /></td></tr>
      <tr>
        <td>Dueño:</td>
        <td>
          <select th:field="*{dueno.id}">
            <option value="">Seleccionar dueño</option>
            <option th:each="usuario : ${usuarios}"
                    th:value="${usuario.id}"
                    th:text="${usuario.nombre + ' ' + usuario.apellido}">
            </option>
          </select>
        </td>
      </tr>
      <tr><td colspan="2"><button type="submit">Guardar</button></td></tr>
    </table>
  </form>
</div>
</body>
</html>
