<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <title>PetSit – Crear cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">

<h1 class="mb-4">Crear cuenta</h1>

<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<div th:if="${ok}" class="alert alert-success" th:text="${ok}"></div>

<form th:action="@{/petsit/home/register}" th:object="${form}" method="post" class="row g-3">
    <div class="col-md-6">
        <label class="form-label">Nombre</label>
        <input class="form-control" th:field="*{nombre}" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Apellido</label>
        <input class="form-control" th:field="*{apellido}" required>
    </div>

    <div class="col-12">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" th:field="*{correo}" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Contraseña</label>
        <input class="form-control" type="password" th:field="*{contrasena}" required minlength="6">
    </div>

    <div class="col-md-6">
        <label class="form-label">Teléfono</label>
        <input class="form-control" th:field="*{telefono}">
    </div>

    <div class="col-12">
        <button class="btn btn-primary" type="submit">Crear cuenta</button>
        <a class="btn btn-link" th:href="@{/petsit/home/login}">Ya tengo cuenta</a>
    </div>
</form>

</body>
</html>
