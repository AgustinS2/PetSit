=<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title>Listado de Postulaciones</title>
</head>
<body>
<div align="center">
  <h1>Listado de Postulaciones</h1>
  <br />
  <table>
    <tr>
      <th><a href="/petsit">Volver al menú principal</a></th>
      <th>&nbsp;</th>
      <th><a href="/petsit/postulaciones/new">Crear nueva Postulación</a></th>
    </tr>
  </table>
  <br />
  <table border="1" cellpadding="10">
    <thead>
    <tr>
      <th>ID</th>
      <th>Adopción (Mascota)</th>
      <th>Usuario</th>
      <th>Fecha</th>
      <th>Mensaje</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="postulacion : ${listPostulaciones}">
      <td th:text="${postulacion.id}">ID</td>
      <td th:text="${postulacion.adopcion.mascota.nombre}">Mascota</td>
      <td th:text="${postulacion.usuario.nombre} + ' ' + ${postulacion.usuario.apellido}">Usuario</td>
      <td th:text="${#dates.format(postulacion.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</td>
      <td th:text="${postulacion.mensaje}">Mensaje</td>
      <td>
        <a th:href="@{'/petsit/postulaciones/edit/' + ${postulacion.id}}">Editar</a> |
        <a th:href="@{'/petsit/postulaciones/delete/' + ${postulacion.id}}">Borrar</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
