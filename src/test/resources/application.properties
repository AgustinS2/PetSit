# Configuraciˇn datasource para H2 en memoria
spring.datasource.url=jdbc:h2:mem:db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Plataforma y dialecto de Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Hibernate DDL auto: crea tablas y borra al terminar para test limpio
spring.jpa.hibernate.ddl-auto=none
# Para que Hibernate muestre SQL por consola y formatee
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Cache de Hibernate (dejalo si usßs EhCache o similar)
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=true
hibernate.cache.region.factory_class=org.hibernate.cache.ehcache.EhCacheRegionFactory
# Configuraciˇn para inicializaciˇn con scripts SQL (schema y data)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:/schema.sql
spring.sql.init.data-locations=classpath:/data.sql
# H2 Console habilitada para debug
spring.h2.console.enabled=true
# Logging para ver sentencias SQL y bind parameters
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Logs generales para Spring y Hibernate
logging.level.org.springframework=DEBUG
logging.level.org.hibernate=DEBUG